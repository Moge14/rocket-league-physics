<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rocket League - Final Polish</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border-left: 4px solid #ff3e3e; pointer-events: none; }
        #boost-gui { position: absolute; bottom: 30px; right: 30px; width: 200px; height: 20px; background: #222; border-radius: 10px; border: 2px solid #444; overflow: hidden; }
        #boost-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #ff8c00, #ff3e3e); }
        #cam-indicator { position: absolute; bottom: 30px; left: 30px; color: #ffcc00; font-weight: bold; font-size: 1.2em; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0">V8: Pro Physics</h2>
        <p><kbd>F</kbd> Toggle Ball Cam | <kbd>Shift</kbd> Air Roll</p>
        <p><kbd>Space</kbd> Jump / Dodge (Directional)</p>
    </div>

    <div id="cam-indicator">Car Cam</div>
    <div id="boost-gui"><div id="boost-fill"></div></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';

        // --- 1. CORE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -35, 0) });
        
        // --- 2. ARENA & LIGHTING ---
        const P_W = 140, P_L = 260, P_H = 80;
        const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
        groundBody.quaternion.setFromEuler(-Math.PI/2, 0, 0); world.addBody(groundBody);
        
        const grid = new THREE.GridHelper(300, 30, 0x444444, 0x222222);
        scene.add(grid);
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(P_W, P_L), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        floor.rotation.x = -Math.PI/2; scene.add(floor);

        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const sun = new THREE.DirectionalLight(0xffffff, 1.5); sun.position.set(50, 100, 50); scene.add(sun);

        // --- 3. HIGH QUALITY CAR MESH ---
        const carGroup = new THREE.Group();
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3b82f6, roughness: 0.3 });
        const blackMat = new THREE.MeshStandardMaterial({ color: 0x111111 });

        // Chasis
        const chasis = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.5, 2.8), bodyMat);
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 1.2), blackMat);
        cabin.position.set(0, 0.4, -0.2);
        const wing = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.1, 0.5), bodyMat);
        wing.position.set(0, 0.5, -1.2);
        
        // Wheels
        const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 12);
        wheelGeo.rotateZ(Math.PI/2);
        const wheelPos = [[0.8, -0.2, 0.9], [-0.8, -0.2, 0.9], [0.8, -0.2, -0.9], [-0.8, -0.2, -0.9]];
        wheelPos.forEach(p => {
            const w = new THREE.Mesh(wheelGeo, blackMat); w.position.set(...p); carGroup.add(w);
        });

        carGroup.add(chasis, cabin, wing);
        scene.add(carGroup);

        const carBody = new CANNON.Body({ mass: 15, shape: new CANNON.Sphere(1.2), position: new CANNON.Vec3(0, 5, 80) });
        carBody.angularDamping = 0.96; world.addBody(carBody);

        // --- 4. BALL ---
        const ballBody = new CANNON.Body({ mass: 2, shape: new CANNON.Sphere(2.5), position: new CANNON.Vec3(0, 5, 0) });
        world.addBody(ballBody);
        const ballMesh = new THREE.Mesh(new THREE.SphereGeometry(2.5, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4 }));
        scene.add(ballMesh);

        // --- 5. LOGIC & DODGING ---
        let carPitch = 0, carYaw = Math.PI, carRoll = 0;
        let isBallCam = false, boost = 100, canDodge = true;
        const keys = {};

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'KeyF') {
                isBallCam = !isBallCam;
                document.getElementById('cam-indicator').innerText = isBallCam ? "Ball Cam" : "Car Cam";
            }
            if (e.code === 'Space') {
                const grounded = carBody.position.y < 1.4;
                if (grounded) { carBody.velocity.y = 15; canDodge = true; }
                else if (canDodge) performDodge();
            }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function performDodge() {
            const q = new THREE.Quaternion().setFromEuler(new THREE.Euler(0, carYaw, 0));
            const dodgeDir = new THREE.Vector3(0, 0, 0);
            
            if (keys['KeyW']) dodgeDir.z += 1;
            if (keys['KeyS']) dodgeDir.z -= 1;
            if (keys['KeyA']) dodgeDir.x += 1;
            if (keys['KeyD']) dodgeDir.x -= 1;
            if (dodgeDir.length() === 0) dodgeDir.z += 1; // Default front flip

            dodgeDir.applyQuaternion(q).normalize();
            carBody.velocity.x += dodgeDir.x * 18;
            carBody.velocity.z += dodgeDir.z * 18;
            carBody.velocity.y += 4;
            canDodge = false;
        }

        function animate() {
            requestAnimationFrame(animate);
            world.fixedStep();
            const grounded = carBody.position.y < 1.4;

            // Rotation Logic
            if (keys['KeyW']) grounded ? carBody.applyForce(new CANNON.Vec3(0,0,1).scale(1800), carBody.position) : carPitch -= 0.07;
            if (keys['KeyS']) grounded ? carBody.applyForce(new CANNON.Vec3(0,0,1).scale(-1800), carBody.position) : carPitch += 0.07;
            if (keys['KeyA']) keys['ShiftLeft'] ? carRoll += 0.08 : carYaw += 0.06;
            if (keys['KeyD']) keys['ShiftLeft'] ? carRoll -= 0.08 : carYaw -= 0.06;

            if (grounded) { carPitch *= 0.8; carRoll *= 0.8; canDodge = true; boost = Math.min(100, boost + 0.1); }
            if (keys['KeyE'] && boost > 0) { 
                const q = new THREE.Quaternion().setFromEuler(new THREE.Euler(carPitch, carYaw, carRoll));
                const f = new THREE.Vector3(0,0,1).applyQuaternion(q);
                carBody.applyForce(new CANNON.Vec3(f.x, f.y, f.z).scale(2800), carBody.position);
                boost -= 0.4;
            }
            document.getElementById('boost-fill').style.width = boost + '%';

            // Sync Visuals
            carGroup.position.copy(carBody.position);
            carGroup.quaternion.setFromEuler(new THREE.Euler(carPitch, carYaw, carRoll));
            ballMesh.position.copy(ballBody.position);

            // --- FIXED CAMERA CONTROL ---
            const camOffset = new THREE.Vector3(0, 4.5, -12); // Tighter follow
            camOffset.applyAxisAngle(new THREE.Vector3(0, 1, 0), carYaw);
            const targetCamPos = carGroup.position.clone().add(camOffset);
            camera.position.copy(targetCamPos);

            if (isBallCam) {
                camera.lookAt(ballMesh.position);
            } else {
                // Car Cam looks at a point ahead of the car
                const lookAtPos = carGroup.position.clone().add(new THREE.Vector3(0,0,10).applyAxisAngle(new THREE.Vector3(0,1,0), carYaw));
                camera.lookAt(lookAtPos);
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
