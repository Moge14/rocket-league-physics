<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rocket League - Stadium Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border-left: 5px solid #3b82f6; pointer-events: none; }
        kbd { background: #333; padding: 2px 4px; border-radius: 4px; border: 1px solid #555; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0; color: #3b82f6;">Stadium Pro v4</h2>
        <p><kbd>W</kbd> <kbd>S</kbd> : Drive | <kbd>A</kbd> <kbd>D</kbd> : Steer</p>
        <p><kbd>Shift</kbd> + <kbd>A</kbd> <kbd>D</kbd> : <strong>Air Roll</strong></p>
        <p><kbd>Space</kbd> : Jump / <strong>Dodge</strong> | <kbd>E</kbd> : Boost</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a12);
        // Add a simple fog for depth
        scene.fog = new THREE.Fog(0x0a0a12, 100, 500);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -35, 0) });
        
        // Materials
        const ballMat = new CANNON.Material('ball');
        const groundMat = new CANNON.Material('ground');
        const carMat = new CANNON.Material('car');
        world.addContactMaterial(new CANNON.ContactMaterial(groundMat, carMat, { friction: 1.0, restitution: 0.0 }));
        world.addContactMaterial(new CANNON.ContactMaterial(groundMat, ballMat, { friction: 0.2, restitution: 0.8 }));

        // --- STADIUM DIMENSIONS ---
        const P_W = 120; // Width
        const P_L = 220; // Length
        const P_H = 60;  // Height

        // --- BACKGROUND / SKY ---
        const skyGeo = new THREE.SphereGeometry(800, 32, 32);
        const skyMat = new THREE.MeshBasicMaterial({ color: 0x111122, side: THREE.BackSide });
        scene.add(new THREE.Mesh(skyGeo, skyMat));

        // --- FLOOR & WALLS (THICK TO PREVENT CLIPPING) ---
        function createWall(w, h, d, x, y, z, rx=0, ry=0, rz=0, color=0x111111, op=0.2) {
            const body = new CANNON.Body({ mass: 0, shape: new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)), material: groundMat });
            body.position.set(x, y, z);
            body.quaternion.setFromEuler(rx, ry, rz);
            world.addBody(body);

            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshPhongMaterial({ color, transparent: true, opacity: op }));
            mesh.position.set(x, y, z);
            mesh.rotation.set(rx, ry, rz);
            scene.add(mesh);
        }

        // Main Floor (Green Grass)
        createWall(P_W, 2, P_L, 0, -1, 0, 0, 0, 0, 0x1a472a, 1);
        
        // Perimeter Walls (Thickened to 10 units)
        createWall(P_W, P_H, 10, 0, P_H/2, P_L/2 + 5);  // Back
        createWall(P_W, P_H, 10, 0, P_H/2, -P_L/2 - 5); // Front
        createWall(10, P_H, P_L, P_W/2 + 5, P_H/2, 0);  // Right
        createWall(10, P_H, P_L, -P_W/2 - 5, P_H/2, 0); // Left
        createWall(P_W, 10, P_L, 0, P_H + 5, 0);        // Roof

        // CURVED CORNERS (The "Wedges")
        // These are 45-degree ramps that connect floor to walls
        const wedgeSize = 10;
        // Floor to Side Walls
        createWall(wedgeSize * 1.4, 1, P_L, P_W/2 - 2, 2, 0, 0, 0, Math.PI/4); // Right ramp
        createWall(wedgeSize * 1.4, 1, P_L, -P_W/2 + 2, 2, 0, 0, 0, -Math.PI/4); // Left ramp

        // --- THE BALL ---
        const ballBody = new CANNON.Body({ mass: 2, shape: new CANNON.Sphere(2.5), position: new CANNON.Vec3(0, 10, 0), material: ballMat });
        ballBody.linearDamping = 0.2;
        world.addBody(ballBody);
        const ballMesh = new THREE.Mesh(new THREE.SphereGeometry(2.5, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        scene.add(ballMesh);

        // --- THE CAR ---
        const carBody = new CANNON.Body({ mass: 15, shape: new CANNON.Sphere(1.4), position: new CANNON.Vec3(0, 2, 60), material: carMat });
        carBody.angularDamping = 0.98;
        world.addBody(carBody);
        
        const carGroup = new THREE.Group();
        const bodyMesh = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.8, 3), new THREE.MeshStandardMaterial({ color: 0x3b82f6 }));
        const noseMesh = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.2, 0.6), new THREE.MeshStandardMaterial({ color: 0xffcc00 }));
        noseMesh.position.set(0, -0.1, 1.4);
        carGroup.add(bodyMesh, noseMesh);
        scene.add(carGroup);

        // --- LOGIC ---
        const keys = {};
        let carRotY = Math.PI;
        let carRotZ = 0; // For Air Roll
        let canDodge = true;

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space') handleJump();
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function handleJump() {
            const isGrounded = carBody.position.y < 1.5;
            if (isGrounded) {
                carBody.velocity.y = 15;
                canDodge = true;
            } else if (canDodge) {
                // DODGE MECHANIC
                const forward = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0, 1, 0), carRotY);
                carBody.velocity.x += forward.x * 15;
                carBody.velocity.z += forward.z * 15;
                carBody.velocity.y += 5; // Slight pop up
                canDodge = false;
                // Visual feedback
                bodyMesh.material.color.set(0xffffff);
                setTimeout(() => bodyMesh.material.color.set(0x3b82f6), 100);
            }
        }

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const pLight = new THREE.PointLight(0x3b82f6, 1000, 300);
        pLight.position.set(0, 40, 0);
        scene.add(pLight);

        function animate() {
            requestAnimationFrame(animate);
            world.fixedStep();

            const isGrounded = carBody.position.y < 1.5;
            const forward = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0, 1, 0), carRotY);
            const cForward = new CANNON.Vec3(forward.x, forward.y, forward.z);

            // Driving
            if (keys['KeyW']) carBody.applyForce(cForward.scale(isGrounded ? 1500 : 200), carBody.position);
            if (keys['KeyS']) carBody.applyForce(cForward.scale(isGrounded ? -1500 : -200), carBody.position);

            // Steering vs Air Roll
            if (keys['KeyA']) {
                if (isGrounded) carRotY += 0.06;
                else if (keys['ShiftLeft'] || keys['ShiftRight']) carRotZ += 0.08; // Air Roll
                else carRotY += 0.04; // Normal Air Turn
            }
            if (keys['KeyD']) {
                if (isGrounded) carRotY -= 0.06;
                else if (keys['ShiftLeft'] || keys['ShiftRight']) carRotZ -= 0.08; // Air Roll
                else carRotY -= 0.04;
            }

            // Auto-level Roll when grounded
            if (isGrounded) carRotZ *= 0.9;

            if (keys['KeyE']) carBody.applyForce(cForward.scale(1800), carBody.position);

            // Update Visuals
            carGroup.position.copy(carBody.position);
            carGroup.rotation.set(0, carRotY, carRotZ); // Apply Air Roll to Z axis
            ballMesh.position.copy(ballBody.position);
            ballMesh.quaternion.copy(ballBody.quaternion);

            // Smooth Camera
            const camOffset = new THREE.Vector3(0, 8, -25).applyAxisAngle(new THREE.Vector3(0, 1, 0), carRotY);
            camera.position.lerp(carGroup.position.clone().add(camOffset), 0.1);
            camera.lookAt(carGroup.position);

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
