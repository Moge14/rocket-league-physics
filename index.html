<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fixed Rocket League Physics</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border-left: 5px solid #00d2ff; }
        kbd { background: #444; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0">Stable Physics Tester</h2>
        <p><kbd>W</kbd> <kbd>S</kbd> : Drive | <kbd>A</kbd> <kbd>D</kbd> : Turn</p>
        <p><kbd>Space</kbd> : Jump | <kbd>E</kbd> : Boost</p>
        <p style="color: #00d2ff; font-size: 0.8em;">Sphere-Colider Mode: <strong>STABLE</strong></p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';

        // --- SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.5);
        light.position.set(10, 50, 10);
        scene.add(light, new THREE.AmbientLight(0x404040));

        const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -25, 0) });

        // --- THE GROUND ---
        const floorBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
        floorBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
        world.addBody(floorBody);
        scene.add(new THREE.GridHelper(200, 40, 0x00d2ff, 0x222222));

        // --- THE CAR (THE SECRET FIX) ---
        // We use a SPHERE for physics because it can't get stuck on corners!
        const carRadius = 1.2;
        const carBody = new CANNON.Body({ 
            mass: 10, 
            shape: new CANNON.Sphere(carRadius),
            position: new CANNON.Vec3(0, 5, 0)
        });
        carBody.angularDamping = 0.95; // High damping prevents infinite rolling
        carBody.linearDamping = 0.1;
        world.addBody(carBody);

        // Visual Box (The car you see)
        const carVisual = new THREE.Mesh(
            new THREE.BoxGeometry(1.8, 0.8, 2.8),
            new THREE.MeshPhongMaterial({ color: 0x3a7bd5 })
        );
        scene.add(carVisual);

        // --- THE BALL ---
        const ballBody = new CANNON.Body({ mass: 1, shape: new CANNON.Sphere(2), position: new CANNON.Vec3(0, 5, -15) });
        world.addBody(ballBody);
        const ballMesh = new THREE.Mesh(new THREE.SphereGeometry(2), new THREE.MeshPhongMaterial({ color: 0xffffff }));
        scene.add(ballMesh);

        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        let carRotation = 0; // Track the visual rotation separately

        function animate() {
            requestAnimationFrame(animate);
            world.fixedStep();

            const isGrounded = carBody.position.y < carRadius + 0.1;
            
            // 1. DIRECTIONAL LOGIC
            // We drive based on where the visual car is facing
            const forward = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0, 1, 0), carRotation);
            const cannonForward = new CANNON.Vec3(forward.x, forward.y, forward.z);

            // 2. MOVEMENT
            if (keys['KeyW']) carBody.applyForce(cannonForward.scale(isGrounded ? 500 : 100), carBody.position);
            if (keys['KeyS']) carBody.applyForce(cannonForward.scale(isGrounded ? -500 : -100), carBody.position);
            
            // 3. STEERING (Rotate the visual car)
            if (keys['KeyA']) carRotation += 0.05;
            if (keys['KeyD']) carRotation -= 0.05;

            // 4. JUMP & BOOST
            if (keys['Space'] && isGrounded) {
                carBody.velocity.y = 12;
                keys['Space'] = false;
            }
            if (keys['KeyE']) carBody.applyForce(cannonForward.scale(600), carBody.position);

            // --- SYNC VISUALS ---
            carVisual.position.copy(carBody.position);
            
            // Tilt the car visual slightly based on velocity to make it feel alive
            carVisual.rotation.set(0, carRotation, 0);
            
            ballMesh.position.copy(ballBody.position);

            // Camera follow
            const camOffset = new THREE.Vector3(0, 6, -15).applyAxisAngle(new THREE.Vector3(0, 1, 0), carRotation);
            camera.position.lerp(carVisual.position.clone().add(camOffset), 0.1);
            camera.lookAt(carVisual.position);

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
