<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rocket League - Ultimate Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 12px; border-left: 5px solid #ff3b3b; pointer-events: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { margin: 0 0 10px 0; color: #ff3b3b; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; }
        p { margin: 5px 0; font-size: 0.9em; color: #ddd; }
        kbd { background: #333; padding: 3px 6px; border-radius: 4px; border: 1px solid #555; color: #fff; font-weight: bold; }
        #boost-container { position: absolute; bottom: 40px; right: 40px; width: 250px; height: 20px; background: rgba(0,0,0,0.5); border-radius: 10px; overflow: hidden; border: 2px solid #444; transform: skewX(-15deg); }
        #boost-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff8c00, #ff3b3b); box-shadow: 0 0 10px #ff3b3b; }
        #cam-indicator { position: absolute; bottom: 40px; left: 40px; color: #fff; font-weight: 900; font-size: 1.5em; text-transform: uppercase; text-shadow: 2px 2px 0 #000; }
        .ball-cam-active { color: #ffcc00 !important; }
    </style>
</head>
<body>

    <div id="ui">
        <h2>Definitive Edition</h2>
        <p><kbd>W</kbd> / <kbd>S</kbd> : Drive Forward / Reverse</p>
        <p><kbd>A</kbd> / <kbd>D</kbd> : Steer (Hold <kbd>Shift</kbd> to Air Roll)</p>
        <p><kbd>Space</kbd> : Jump / Directional Dodge</p>
        <p><kbd>E</kbd> : Rocket Boost | <kbd>F</kbd> : Toggle Ball Cam</p>
    </div>

    <div id="cam-indicator">CAR CAM</div>
    <div id="boost-container"><div id="boost-bar"></div></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';

        // --- 1. CORE ENGINE ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.002);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -35, 0) });
        
        // --- 2. MATERIALS & PHYSICS FRICTION ---
        const groundMat = new CANNON.Material();
        const carMat = new CANNON.Material();
        const ballMat = new CANNON.Material();
        world.addContactMaterial(new CANNON.ContactMaterial(groundMat, carMat, { friction: 1.5, restitution: 0.0 })); // High grip
        world.addContactMaterial(new CANNON.ContactMaterial(groundMat, ballMat, { friction: 0.3, restitution: 0.7 })); // Bouncy ball

        // --- 3. THE ARENA (Procedural Hex Textures & Thick Walls) ---
        // Generate Hexagon Texture
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        ctx.strokeStyle = '#2244aa'; ctx.lineWidth = 3;
        function drawHex(x, y, r) {
            ctx.beginPath();
            for (let i = 0; i < 6; i++) ctx.lineTo(x + r * Math.cos(Math.PI/3 * i), y + r * Math.sin(Math.PI/3 * i));
            ctx.closePath(); ctx.stroke();
        }
        for(let x=0; x<300; x+=60) for(let y=0; y<300; y+=34) drawHex(x + (y%68?30:0), y, 35);
        const hexTex = new THREE.CanvasTexture(canvas);
        hexTex.wrapS = hexTex.wrapT = THREE.RepeatWrapping; hexTex.repeat.set(6, 3);

        const P_W = 160, P_L = 280, P_H = 80; // Pitch dimensions
        
        function createWall(w, h, d, x, y, z, matConfig, isSensor=false) {
            const body = new CANNON.Body({ mass: 0, shape: new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)), material: groundMat, isTrigger: isSensor });
            body.position.set(x, y, z); world.addBody(body);
            if (!isSensor) {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshPhongMaterial(matConfig));
                mesh.position.set(x, y, z); scene.add(mesh);
            }
        }

        // Floor (Dark pitch with grid)
        createWall(P_W, 2, P_L, 0, -1, 0, { color: 0x111111 });
        const grid = new THREE.GridHelper(P_L, 40, 0x333333, 0x1a1a1a);
        grid.position.y = 0.1; scene.add(grid);

        // Thick Glass Walls
        const wallMat = { color: 0x4488ff, transparent: true, opacity: 0.15, map: hexTex, shininess: 100 };
        createWall(P_W, P_H, 10, 0, P_H/2, P_L/2+5, wallMat);  // Back
        createWall(P_W, P_H, 10, 0, P_H/2, -P_L/2-5, wallMat); // Front
        createWall(10, P_H, P_L, P_W/2+5, P_H/2, 0, wallMat);  // Right
        createWall(10, P_H, P_L, -P_W/2-5, P_H/2, 0, wallMat); // Left
        createWall(P_W, 4, P_L, 0, P_H+2, 0, wallMat);         // Roof

        // Skybox
        const sky = new THREE.Mesh(new THREE.SphereGeometry(1500, 32, 32), new THREE.MeshBasicMaterial({ color: 0x050510, side: THREE.BackSide, fog: false }));
        scene.add(sky);

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(50, 150, 50); scene.add(dirLight);

        // --- 4. HIGH QUALITY CAR & BALL ---
        const carGroup = new THREE.Group();
        const paint = new THREE.MeshStandardMaterial({ color: 0xff3b3b, roughness: 0.3, metalness: 0.5 });
        const dark = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
        
        // Chassis & Cabin
        const chassis = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.5, 2.8), paint);
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 1.2), dark);
        cabin.position.set(0, 0.45, -0.2);
        // Spoiler (Identifies the back)
        const spoiler = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.1, 0.4), paint);
        spoiler.position.set(0, 0.6, -1.3);
        // Wheels
        const wGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16); wGeo.rotateZ(Math.PI/2);
        const w1 = new THREE.Mesh(wGeo, dark); w1.position.set(0.9, -0.1, 1.0);
        const w2 = new THREE.Mesh(wGeo, dark); w2.position.set(-0.9, -0.1, 1.0);
        const w3 = new THREE.Mesh(wGeo, dark); w3.position.set(0.9, -0.1, -1.0);
        const w4 = new THREE.Mesh(wGeo, dark); w4.position.set(-0.9, -0.1, -1.0);
        
        // Rocket Thruster
        const thruster = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.4, 1.5, 8), new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0 }));
        thruster.rotation.x = Math.PI/2; thruster.position.set(0, 0, -1.8);

        carGroup.add(chassis, cabin, spoiler, w1, w2, w3, w4, thruster);
        scene.add(carGroup);

        // Physics Body (Sphere for smooth wall-riding)
        const carBody = new CANNON.Body({ mass: 15, shape: new CANNON.Sphere(1.2), position: new CANNON.Vec3(0, 2, 80), material: carMat });
        carBody.angularDamping = 0.95; world.addBody(carBody);

        // The Ball
        const ballBody = new CANNON.Body({ mass: 2, shape: new CANNON.Sphere(2.5), position: new CANNON.Vec3(0, 5, 0), material: ballMat });
        ballBody.linearDamping = 0.2; world.addBody(ballBody);
        const ballMesh = new THREE.Mesh(new THREE.SphereGeometry(2.5, 32, 32), new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.2 }));
        scene.add(ballMesh);

        // --- 5. GAME LOGIC & CONTROLS ---
        const keys = {};
        let carYaw = Math.PI, carPitch = 0, carRoll = 0;
        let boostAmount = 100, isBallCam = false, canDodge = true;
        let flipState = { active: false, type: 'front', progress: 0 };

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'KeyF') {
                isBallCam = !isBallCam;
                const ind = document.getElementById('cam-indicator');
                ind.innerText = isBallCam ? "BALL CAM" : "CAR CAM";
                isBallCam ? ind.classList.add('ball-cam-active') : ind.classList.remove('ball-cam-active');
            }
            if (e.code === 'Space') {
                const grounded = carBody.position.y < 1.5;
                if (grounded) { 
                    carBody.velocity.y = 14; canDodge = true; 
                } else if (canDodge) {
                    executeDodge();
                }
            }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function executeDodge() {
            canDodge = false; flipState.active = true; flipState.progress = 0;
            const q = new THREE.Quaternion().setFromEuler(new THREE.Euler(0, carYaw, 0));
            
            // Determine dodge direction based on input
            let dx = 0, dz = 0;
            if (keys['KeyW']) { dz = 1; flipState.type = 'front'; }
            if (keys['KeyS']) { dz = -1; flipState.type = 'back'; }
            if (keys['KeyA']) { dx = 1; flipState.type = 'left'; }
            if (keys['KeyD']) { dx = -1; flipState.type = 'right'; }
            if (dx === 0 && dz === 0) { dz = 1; flipState.type = 'front'; } // Default

            const forceVec = new THREE.Vector3(dx, 0, dz).normalize().applyQuaternion(q);
            carBody.velocity.x += forceVec.x * 22;
            carBody.velocity.z += forceVec.z * 22;
            carBody.velocity.y = 0; // Kills vertical momentum for snappy dodge
        }

        function animate() {
            requestAnimationFrame(animate);
            world.fixedStep();

            const grounded = carBody.position.y < 1.5;

            // Compute Forward Vector directly from Yaw
            const q = new THREE.Quaternion().setFromEuler(new THREE.Euler(carPitch, carYaw, carRoll));
            const forward = new THREE.Vector3(0,0,1).applyQuaternion(q);
            const cannonFwd = new CANNON.Vec3(forward.x, forward.y, forward.z);

            // Driving & Pitching
            if (keys['KeyW']) grounded ? carBody.applyForce(cannonFwd.scale(1800), carBody.position) : carPitch -= 0.08;
            if (keys['KeyS']) grounded ? carBody.applyForce(cannonFwd.scale(-1800), carBody.position) : carPitch += 0.08;
            
            // Steering & Rolling
            if (keys['KeyA']) { keys['ShiftLeft'] ? carRoll += 0.08 : carYaw += 0.06; }
            if (keys['KeyD']) { keys['ShiftLeft'] ? carRoll -= 0.08 : carYaw -= 0.06; }

            // Boost
            if (keys['KeyE'] && boostAmount > 0) {
                carBody.applyForce(cannonFwd.scale(3000), carBody.position);
                boostAmount -= 0.4;
                thruster.material.opacity = 0.9;
                thruster.scale.set(1, Math.random() + 0.8, 1);
            } else { thruster.material.opacity = 0; }

            // Auto-Leveling & Regen
            if (grounded) {
                carPitch *= 0.8; carRoll *= 0.8;
                boostAmount = Math.min(100, boostAmount + 0.2);
                canDodge = true;
            }
            document.getElementById('boost-bar').style.width = boostAmount + '%';

            // Visual Flip Animation
            let visualPitch = carPitch, visualRoll = carRoll;
            if (flipState.active) {
                flipState.progress += 0.15;
                if (flipState.progress >= 1) flipState.active = false;
                const spin = flipState.progress * Math.PI * 2;
                if (flipState.type === 'front') visualPitch += spin;
                else if (flipState.type === 'back') visualPitch -= spin;
                else if (flipState.type === 'right') visualRoll -= spin;
                else if (flipState.type === 'left') visualRoll += spin;
            }

            // Sync Meshes to Physics
            carGroup.position.copy(carBody.position);
            carGroup.quaternion.setFromEuler(new THREE.Euler(visualPitch, carYaw, visualRoll));
            ballMesh.position.copy(ballBody.position);

            // --- FIXED, NON-RUBBISH CAMERA ---
            // The camera rigidly follows the car, removing the "rubber band" lerp effect.
            const camDist = 14, camHeight = 5;
            const camOffset = new THREE.Vector3(0, camHeight, -camDist).applyAxisAngle(new THREE.Vector3(0,1,0), carYaw);
            camera.position.copy(carGroup.position.clone().add(camOffset));

            if (isBallCam) {
                camera.lookAt(ballMesh.position);
            } else {
                // Look exactly ahead of the car's nose
                const lookTarget = carGroup.position.clone().add(new THREE.Vector3(0,0,20).applyAxisAngle(new THREE.Vector3(0,1,0), carYaw));
                camera.lookAt(lookTarget);
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
