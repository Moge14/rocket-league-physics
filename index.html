<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rocket League - Fixed & Final</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border-left: 4px solid #00f2ff; pointer-events: none; }
        #boost-gui { position: absolute; bottom: 30px; right: 30px; width: 200px; height: 15px; background: #222; border-radius: 10px; border: 2px solid #444; overflow: hidden; }
        #boost-fill { height: 100%; width: 100%; background: #00f2ff; transition: width 0.1s; }
        #cam-indicator { position: absolute; bottom: 30px; left: 30px; color: #ffcc00; font-weight: bold; }
        kbd { background: #333; padding: 2px 4px; border-radius: 4px; border: 1px solid #555; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0">Stadium Fixed</h2>
        <p><kbd>W</kbd> Forward | <kbd>S</kbd> Reverse</p>
        <p><kbd>A</kbd> <kbd>D</kbd> Steer / Air Roll (Shift)</p>
        <p><kbd>Space</kbd> Jump/Dodge | <kbd>F</kbd> Ball Cam</p>
    </div>

    <div id="cam-indicator">CAR CAM</div>
    <div id="boost-gui"><div id="boost-fill"></div></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';

        // --- 1. CORE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -35, 0) });
        
        // --- 2. THE STADIUM (Thick Walls) ---
        const P_W = 140, P_L = 260, P_H = 80;
        const groundMat = new CANNON.Material();
        const carMat = new CANNON.Material();
        world.addContactMaterial(new CANNON.ContactMaterial(groundMat, carMat, { friction: 1.0, restitution: 0 }));

        function createWall(w, h, d, x, y, z, color=0x2244aa, op=0.2) {
            const body = new CANNON.Body({ mass: 0, shape: new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)), material: groundMat });
            body.position.set(x, y, z); world.addBody(body);
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshPhongMaterial({ color, transparent: true, opacity: op }));
            mesh.position.set(x, y, z); scene.add(mesh);
        }

        createWall(P_W, 2, P_L, 0, -1, 0, 0x1a472a, 1); // Grass
        createWall(P_W, P_H, 10, 0, P_H/2, P_L/2 + 5);  // Back
        createWall(P_W, P_H, 10, 0, P_H/2, -P_L/2 - 5); // Front
        createWall(10, P_H, P_L, P_W/2 + 5, P_H/2, 0);  // Right
        createWall(10, P_H, P_L, -P_W/2 - 5, P_H/2, 0); // Left
        createWall(P_W, 2, P_L, 0, P_H + 1, 0);         // Roof

        // --- 3. THE CAR ---
        const carGroup = new THREE.Group();
        const bodyMesh = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 3), new THREE.MeshStandardMaterial({ color: 0x3b82f6 }));
        const nose = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.2, 0.5), new THREE.MeshStandardMaterial({ color: 0xffcc00 }));
        nose.position.set(0, -0.2, 1.4); // Points toward Front
        carGroup.add(bodyMesh, nose);
        scene.add(carGroup);

        const carBody = new CANNON.Body({ mass: 15, shape: new CANNON.Sphere(1.3), position: new CANNON.Vec3(0, 5, 0) });
        carBody.angularDamping = 0.97;
        world.addBody(carBody);

        // --- 4. THE BALL ---
        const ballBody = new CANNON.Body({ mass: 2, shape: new CANNON.Sphere(2.5), position: new CANNON.Vec3(0, 10, -50) });
        world.addBody(ballBody);
        const ballMesh = new THREE.Mesh(new THREE.SphereGeometry(2.5, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        scene.add(ballMesh);

        // --- 5. LOGIC ---
        let carYaw = 0, carPitch = 0, carRoll = 0;
        let isBallCam = false, boost = 100, canDodge = true;
        const keys = {};

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'KeyF') isBallCam = !isBallCam;
            if (e.code === 'Space') {
                if (carBody.position.y < 1.6) { carBody.velocity.y = 16; canDodge = true; }
                else if (canDodge) {
                    const q = new THREE.Quaternion().setFromEuler(new THREE.Euler(0, carYaw, 0));
                    const dir = new THREE.Vector3(0, 0, keys['KeyS'] ? -1 : 1).applyQuaternion(q);
                    carBody.velocity.x += dir.x * 20; carBody.velocity.z += dir.z * 20; carBody.velocity.y += 4;
                    canDodge = false;
                }
            }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const l = new THREE.PointLight(0xffffff, 20000); l.position.set(0, 50, 0); scene.add(l);

        function animate() {
            requestAnimationFrame(animate);
            world.fixedStep();
            const grounded = carBody.position.y < 1.6;

            // Proper Direction Vectors
            const q = new THREE.Quaternion().setFromEuler(new THREE.Euler(carPitch, carYaw, carRoll));
            const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(q);
            const cannonFwd = new CANNON.Vec3(forward.x, forward.y, forward.z);

            // Driving (W = Forward, S = Back)
            if (keys['KeyW']) grounded ? carBody.applyForce(cannonFwd.scale(1800), carBody.position) : carPitch -= 0.07;
            if (keys['KeyS']) grounded ? carBody.applyForce(cannonFwd.scale(-1800), carBody.position) : carPitch += 0.07;
            
            // Steering
            if (keys['KeyA']) keys['ShiftLeft'] ? carRoll += 0.08 : carYaw += 0.06;
            if (keys['KeyD']) keys['ShiftLeft'] ? carRoll -= 0.08 : carYaw -= 0.06;

            // Boost
            if (keys['KeyE'] && boost > 0) {
                carBody.applyForce(cannonFwd.scale(2800), carBody.position);
                boost -= 0.5;
            }
            if (grounded) { boost = Math.min(100, boost + 0.2); carPitch *= 0.8; carRoll *= 0.8; }
            document.getElementById('boost-fill').style.width = boost + '%';
            document.getElementById('cam-indicator').innerText = isBallCam ? "BALL CAM" : "CAR CAM";

            // Sync
            carGroup.position.copy(carBody.position);
            carGroup.quaternion.copy(q);
            ballMesh.position.copy(ballBody.position);

            // Camera - Fixed behind car
            const camOffset = new THREE.Vector3(0, 5, -14).applyAxisAngle(new THREE.Vector3(0, 1, 0), carYaw);
            camera.position.copy(carGroup.position.clone().add(camOffset));
            
            if (isBallCam) camera.lookAt(ballMesh.position);
            else camera.lookAt(carGroup.position.clone().add(forward.clone().multiplyScalar(10)));

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
