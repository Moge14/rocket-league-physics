<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Rocket League - Stadium Alpha</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; pointer-events: none; border-left: 4px solid #4ade80; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0; color: #4ade80;">Stadium Beta</h2>
        <p><kbd>W</kbd> <kbd>S</kbd> : Drive | <kbd>A</kbd> <kbd>D</kbd> : Steer</p>
        <p><kbd>Space</kbd> : Jump | <kbd>E</kbd> : Boost</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';

        // --- SCENE & RENDERER ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x050505);
        document.body.appendChild(renderer.domElement);

        // --- PHYSICS WORLD ---
        const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -35, 0) });
        
        // Materials for high-fidelity bouncing
        const ballMat = new CANNON.Material('ball');
        const groundMat = new CANNON.Material('ground');
        const carMat = new CANNON.Material('car');

        world.addContactMaterial(new CANNON.ContactMaterial(ballMat, groundMat, { restitution: 0.7, friction: 0.5 }));
        world.addContactMaterial(new CANNON.ContactMaterial(carMat, groundMat, { restitution: 0.1, friction: 2.0 })); // Ultra traction
        world.addContactMaterial(new CANNON.ContactMaterial(carMat, ballMat, { restitution: 0.9, friction: 0.1 }));

        // --- THE PITCH (Grass & Size) ---
        const pitchWidth = 120;
        const pitchLength = 200;

        // Grass Texture (Procedural)
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#1a472a'; ctx.fillRect(0,0,512,512);
        for(let i=0; i<5000; i++) {
            ctx.fillStyle = `rgba(20, ${60 + Math.random()*40}, 20, 0.3)`;
            ctx.fillRect(Math.random()*512, Math.random()*512, 2, 10);
        }
        const grassTex = new THREE.CanvasTexture(canvas);
        grassTex.wrapS = grassTex.wrapT = THREE.RepeatWrapping;
        grassTex.repeat.set(10, 15);

        const floorGeo = new THREE.PlaneGeometry(pitchWidth, pitchLength);
        const floorMesh = new THREE.Mesh(floorGeo, new THREE.MeshPhongMaterial({ map: grassTex }));
        floorMesh.rotation.x = -Math.PI / 2;
        scene.add(floorMesh);

        const floorBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane(), material: groundMat });
        floorBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
        world.addBody(floorBody);

        // --- CLEAR WALLS ---
        function createGlassWall(w, h, d, x, y, z, rx=0, ry=0) {
            const body = new CANNON.Body({ mass: 0, shape: new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)), material: groundMat });
            body.position.set(x, y, z);
            body.quaternion.setFromEuler(rx, ry, 0);
            world.addBody(body);

            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(w, h, d),
                new THREE.MeshPhongMaterial({ color: 0x88ccff, transparent: true, opacity: 0.15, shininess: 100 })
            );
            mesh.position.set(x, y, z);
            mesh.rotation.set(rx, ry, 0);
            scene.add(mesh);
        }

        const wallH = 60;
        createGlassWall(pitchWidth, wallH, 1, 0, wallH/2, pitchLength/2);  // Back
        createGlassWall(pitchWidth, wallH, 1, 0, wallH/2, -pitchLength/2); // Front
        createGlassWall(1, wallH, pitchLength, pitchWidth/2, wallH/2, 0);  // Right
        createGlassWall(1, wallH, pitchLength, -pitchWidth/2, wallH/2, 0); // Left

        // --- THE BALL (Perfect Sphere Hitbox) ---
        const ballRad = 2.5;
        const ballBody = new CANNON.Body({ 
            mass: 2, 
            shape: new CANNON.Sphere(ballRad), // Exact shape
            position: new CANNON.Vec3(0, 10, 0),
            material: ballMat 
        });
        ballBody.linearDamping = 0.2;
        world.addBody(ballBody);

        const ballMesh = new THREE.Mesh(
            new THREE.SphereGeometry(ballRad, 32, 32),
            new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.4 })
        );
        scene.add(ballMesh);

        // --- THE CAR ---
        const carBody = new CANNON.Body({ 
            mass: 15, 
            shape: new CANNON.Sphere(1.4), 
            position: new CANNON.Vec3(0, 2, 60),
            material: carMat
        });
        carBody.angularDamping = 0.98;
        world.addBody(carBody);

        const carGroup = new THREE.Group();
        const carVisual = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.8, 3), new THREE.MeshStandardMaterial({ color: 0x2563eb }));
        const carNose = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.2, 0.6), new THREE.MeshStandardMaterial({ color: 0xffcc00 }));
        carNose.position.set(0, -0.1, 1.4);
        carGroup.add(carVisual, carNose);
        scene.add(carGroup);

        // --- LIGHTS ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const spot = new THREE.SpotLight(0xffffff, 10000);
        spot.position.set(0, 100, 0);
        spot.angle = Math.PI / 4;
        scene.add(spot);

        // --- LOOP ---
        const keys = {};
        let carRot = Math.PI;
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);
            world.fixedStep();

            const isGrounded = carBody.position.y < 1.5;
            const forward = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0, 1, 0), carRot);
            const cForward = new CANNON.Vec3(forward.x, forward.y, forward.z);

            if (keys['KeyW']) carBody.applyForce(cForward.scale(isGrounded ? 1200 : 200), carBody.position);
            if (keys['KeyS']) carBody.applyForce(cForward.scale(isGrounded ? -1200 : -200), carBody.position);
            
            const speed = carBody.velocity.length();
            if (keys['KeyA']) carRot += 0.07 * Math.min(1, speed * 0.1);
            if (keys['KeyD']) carRot -= 0.07 * Math.min(1, speed * 0.1);

            if (keys['Space'] && isGrounded) { carBody.velocity.y = 15; keys['Space'] = false; }
            if (keys['KeyE']) carBody.applyForce(cForward.scale(1500), carBody.position);

            carGroup.position.copy(carBody.position);
            carGroup.rotation.y = carRot;
            ballMesh.position.copy(ballBody.position);
            ballMesh.quaternion.copy(ballBody.quaternion);

            const camOffset = new THREE.Vector3(0, 8, -22).applyAxisAngle(new THREE.Vector3(0, 1, 0), carRot);
            camera.position.lerp(carGroup.position.clone().add(camOffset), 0.1);
            camera.lookAt(carGroup.position);

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
